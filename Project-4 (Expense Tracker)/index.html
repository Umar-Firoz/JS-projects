<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="../src/output.css" />
  </head>
  <body class="bg-green-200 flex items-center justify-center min-h-screen p-4">
    <div
      class="container w-full max-w-7xl p-6 md:p-9 bg-white rounded-xl shadow flex flex-col gap-4 md:gap-8"
    >
      <div class="header text-4xl md:text-5xl text-center  ">
        Expense Tracker
      </div>
      <div
        class="balance-container text-center bg-white p-5 rounded-2xl bg-gradient-to-r from-[#a1cdac] to-[#93b955]"
      >
        <div >
          <span  class="text-lg md:text-2xl font-medium text-gray-600"
            >Your Balance</span
          >
          <br />
          <span
            id="total-balance"
            class="text-4xl md:text-5xl font-bold mt-4 block"
            >$0</span
          >
        </div>
        <div
          class="income-expense-box grid grid-cols-1 md:grid-cols-2 gap-4 mt-3 md:mt-7"
        >
          <div
            class="bg-white p-1 md:p-4 rounded-xl text-green-700 text-xl font-medium"
          >
            Income
            <br />
            <span
              id="income-amt"
              class="text-2xl md:text-3xl font-semibold block mt-1 md:mt-3"
              >$0</span
            >
          </div>
          <div class="bg-white  p-1 md:p-4 rounded-xl text-red-700 text-xl font-medium">
            Expense
            <br />
            <span
              id="expense-amt"
              class="text-2xl md:text-3xl font-semibold block mt-1 md:mt-3"
            >
              $0
            </span>
          </div>
        </div>
      </div>
      <div
        class="transaction-add-transaction-container grid grid-cols-1 md:grid-cols-2 gap-4"
      >
        <div class="all-transiction bg-white rounded-xl shadow p-3 md:p-5">
          <div class="heading text-xl md:text-2xl font-medium text-gray-600">
            Transactions
          </div>
          <div class="transitions-container max-h-[394px] overflow-scroll mt-4 flex flex-col space-y-4">

          </div>
        </div>
        <div class="add-transiction bg-white rounded-xl shadow p-3 md:p-5 ">
          <div class="heading text-xl md:text-2xl font-medium text-gray-600 mb-4">
            Add Transactions
          </div>
          <div class="flex flex-col">
            <div class="all-input-field flex flex-col gap-4">
              <div class="description text-xl ">
              Description
                <input class="description-text block w-full mt-3 border border-gray-300 rounded-md p-3 outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500 transition" type="text" placeholder="Enter Description">
              </div>
              <div class="transaction-type text-xl">
              Type
               <div class="flex gap-3 mt-3">
                <div id="income-btn" class="type-income px-4 py-2 rounded-md bg-green-600  text-white font-medium cursor-pointer">
                Income
                </div>
                <div id="expense-btn" class="type-expense px-4 py-2 rounded-md bg-gray-200 text-gray-700  font-medium cursor-pointer">
                Expense
                  </div>
               </div>
             </div>

              <div class="amount-input text-xl">
              Amount
              <input class="amount-input-field block w-full mt-3 border border-gray-300 rounded-md p-3 outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500 transition" type="number" placeholder="Enter Amount">
            </div>
            </div>
            <div class="cta-btn w-full mt-6 text-center text-xl font-medium text-white rounded-xl shadow p-4 bg-gradient-to-r from-green-700 to-green-300 hover:from-green-800 hover:to-green-400 hover:shadow-lg active:scale-95 transition duration-200 cursor-pointer">
            Add Transaction
           </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src = "./Scripts/script.js"></script>
  </body>
</html>
